<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ラストウォー風サバイバル</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  text-align: center;
}

#game {
  width: 400px;
  height: 400px;
  margin: 20px auto;
  background: #222;
  position: relative;
  border: 2px solid white;
}

.player {
  width: 20px;
  height: 20px;
  background: lime;
  position: absolute;
}

.enemy {
  width: 20px;
  height: 20px;
  background: red;
  position: absolute;
}

.bullet {
  width: 5px;
  height: 5px;
  background: yellow;
  position: absolute;
}

#info {
  margin-top: 10px;
}

button {
  padding: 10px;
  font-size: 16px;
  margin-top: 10px;
}
</style>
</head>
<body>

<h1>ラストウォー風サバイバル</h1>
<div id="game"></div>
<div id="info">HP: <span id="hp">100</span> | スコア: <span id="score">0</span></div>
<button onclick="startGame()">スタート</button>

<script>
const game = document.getElementById("game");
let player, hp, score, enemies = [], bullets = [], gameLoop;

function startGame() {
  game.innerHTML = "";
  enemies = [];
  bullets = [];
  hp = 100;
  score = 0;
  updateUI();

  player = createDiv("player", 190, 190);

  document.onkeydown = movePlayer;

  gameLoop = setInterval(loop, 50);
  setInterval(spawnEnemy, 1000);
}

function createDiv(className, x, y) {
  const div = document.createElement("div");
  div.className = className;
  div.style.left = x + "px";
  div.style.top = y + "px";
  game.appendChild(div);
  return div;
}

function movePlayer(e) {
  let x = player.offsetLeft;
  let y = player.offsetTop;

  if (e.key === "ArrowUp") y -= 10;
  if (e.key === "ArrowDown") y += 10;
  if (e.key === "ArrowLeft") x -= 10;
  if (e.key === "ArrowRight") x += 10;
  if (e.key === " ") shoot();

  player.style.left = Math.max(0, Math.min(380, x)) + "px";
  player.style.top = Math.max(0, Math.min(380, y)) + "px";
}

function shoot() {
  let bullet = createDiv("bullet", player.offsetLeft + 8, player.offsetTop);
  bullets.push(bullet);
}

function spawnEnemy() {
  let x = Math.random() * 380;
  let enemy = createDiv("enemy", x, 0);
  enemies.push(enemy);
}

function loop() {
  bullets.forEach((b, bi) => {
    b.style.top = (b.offsetTop - 10) + "px";

    enemies.forEach((e, ei) => {
      if (collision(b, e)) {
        game.removeChild(b);
        game.removeChild(e);
        bullets.splice(bi, 1);
        enemies.splice(ei, 1);
        score += 10;
        updateUI();
      }
    });
  });

  enemies.forEach((e, ei) => {
    e.style.top = (e.offsetTop + 3) + "px";

    if (collision(e, player)) {
      hp -= 10;
      game.removeChild(e);
      enemies.splice(ei, 1);
      updateUI();

      if (hp <= 0) endGame();
    }
  });
}

function collision(a, b) {
  return !(
    a.offsetTop > b.offsetTop + 20 ||
    a.offsetTop + 5 < b.offsetTop ||
    a.offsetLeft > b.offsetLeft + 20 ||
    a.offsetLeft + 5 < b.offsetLeft
  );
}

function updateUI() {
  document.getElementById("hp").textContent = hp;
  document.getElementById("score").textContent = score;
}

function endGame() {
  clearInterval(gameLoop);
  alert("ゲームオーバー！ スコア: " + score);
}
</script>

</body>
</html>
