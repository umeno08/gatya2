<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ラストウォー風サバイバル（高速＆集結）</title>
<style>
body { margin:0; font-family:Arial; background:#111; color:#fff; text-align:center; }
#game { width:400px; height:500px; margin:20px auto; background:#222; position:relative; border:2px solid #fff; overflow:hidden; }
.player,.ally{ width:20px;height:20px;position:absolute; }
.player{ background:lime; }
.ally{ background:cyan; }
.enemy{ width:20px;height:20px;background:red;position:absolute;color:white;font-size:10px;text-align:center; }
.boss{ background:purple; }
.bullet{ width:4px;height:8px;background:yellow;position:absolute; }
.bar{ width:60px;height:20px;background:orange;position:absolute;color:black;font-size:12px;line-height:20px; }
</style>
</head>
<body>
<h1>ラストウォー風サバイバル（高速化）</h1>
<div id="game"></div>
<div>HP:<span id="hp">100</span> スコア:<span id="score">0</span> 味方:<span id="allyCount">1</span></div>
<button onclick="startGame()">スタート</button>

<script>
const game=document.getElementById("game");
let player,hp,score,enemies=[],bullets=[],allies=[],bars=[];
let loopId,spawnId,shootId,barId;

function startGame(){
 game.innerHTML="";
 enemies=[];bullets=[];allies=[];bars=[];
 hp=100;score=0;
 player=create("player",190,460);
 allies.push(player);
 updateUI();
 document.onkeydown=move;
 loopId=setInterval(loop,30);
 spawnId=setInterval(spawnEnemy,300); // 敵増加
 shootId=setInterval(autoShoot,200);
 barId=setInterval(spawnBar,4000); // バー減少
}

function create(cls,x,y,text=""){
 let d=document.createElement("div");
 d.className=cls;
 d.style.left=x+"px";
 d.style.top=y+"px";
 d.innerText=text;
 game.appendChild(d);
 return d;
}

function move(e){
 let x=player.offsetLeft;
 if(e.key==="ArrowLeft")x-=20;
 if(e.key==="ArrowRight")x+=20;
 x=Math.max(0,Math.min(380,x));
 player.style.left=x+"px";

 // 味方を周囲に集結（円形配置）
 let radius=30;
 allies.forEach((a,i)=>{
 if(a===player) return;
 let angle=(i/allies.length)*Math.PI*2;
 a.style.left=(player.offsetLeft+Math.cos(angle)*radius)+"px";
 a.style.top=(player.offsetTop+Math.sin(angle)*radius)+"px";
 });
}

function autoShoot(){
 allies.forEach(a=>{
 bullets.push(create("bullet",a.offsetLeft+8,a.offsetTop));
 });
}

function spawnEnemy(){
 let count=4+Math.floor(score/30);
 for(let i=0;i<count;i++){
 let isBoss=Math.random()<0.2;
 let hpVal=isBoss?20:5;
 let cls=isBoss?"enemy boss":"enemy";
 let e=create(cls,Math.random()*380,0,hpVal);
 e.hp=hpVal;
 enemies.push(e);
 }
}

function spawnBar(){
 let types=["×2","×3","×5","+5","+10"];
 let v=types[Math.floor(Math.random()*types.length)];
 let bar=create("bar",Math.random()*340,0,v);
 bar.type=v;
 bars.push(bar);
}

function loop(){
 bullets.forEach((b,bi)=>{
 b.style.top=(b.offsetTop-10)+"px";
 enemies.forEach((e,ei)=>{
 if(hit(b,e)){
 remove(b);
 bullets.splice(bi,1);
 e.hp--;
 e.innerText=e.hp;
 if(e.hp<=0){
 remove(e);
 enemies.splice(ei,1);
 score+=10;
 }
 updateUI();
 }
 });
 });

 enemies.forEach((e,ei)=>{
 e.style.top=(e.offsetTop+6)+"px"; // 高速化
 if(hit(e,player)){
 hp-=10;
 remove(e);
 enemies.splice(ei,1);
 updateUI();
 if(hp<=0)end();
 }
 });

 bars.forEach((bar,bi)=>{
 bar.style.top=(bar.offsetTop+3)+"px";
 if(hit(bar,player)){
 applyBar(bar.type);
 remove(bar);
 bars.splice(bi,1);
 }
 });
}

function applyBar(type){
 if(type.includes("×")){
 let mult=parseInt(type.replace("×",""));
 let current=[...allies];
 current.forEach(a=>{
 for(let i=0;i<mult-1;i++){
 let nx=Math.random()*380;
 allies.push(create("ally",nx,a.offsetTop));
 }
 });
 } else {
 let add=parseInt(type.replace("+",""));
 for(let i=0;i<add;i++){
 allies.push(create("ally",Math.random()*380,460));
 }
 }
 updateUI();
}

function hit(a,b){
 return !(a.offsetTop>b.offsetTop+20||a.offsetTop+8<b.offsetTop||a.offsetLeft>b.offsetLeft+20||a.offsetLeft+4<b.offsetLeft);
}

function remove(el){if(el&&el.parentNode)el.parentNode.removeChild(el);} 

function updateUI(){
 document.getElementById("hp").textContent=hp;
 document.getElementById("score").textContent=score;
 document.getElementById("allyCount").textContent=allies.length;
}

function end(){
 clearInterval(loopId);
 clearInterval(spawnId);
 clearInterval(shootId);
 clearInterval(barId);
 alert("ゲームオーバー スコア:"+score);
}
</script>
</body>
</html>
